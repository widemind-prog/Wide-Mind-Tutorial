{% extends "base.html" %}
{% block title %}Register | Wide Mind Tutorials{% endblock %}

{% block content %}
<section class="register-section">
  <h2>Create Account</h2>

  <form id="register-form">

    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>

    <select name="department" required>
      <option value="" disabled selected>Select Department</option>
      <option value="Psychology">Psychology</option>
    </select>

    <!-- UPDATED: now includes 200 and 300 level -->
    <select name="level" required>
      <option value="" disabled selected>Select Level</option>
      <option value="400">400 Level</option>
      <option value="300">300 Level</option>
      <option value="200">200 Level</option>
    </select>

    <div class="password-wrapper">
      <input type="password" name="password" id="password"
             placeholder="Enter your password" required>
      <i class="fa-regular fa-eye toggle-password-icon"></i>
    </div>

    <button type="submit" class="btn">Register</button>
  </form>

  <p id="register-msg"></p>

  <!-- Show pricing info so students know what to expect -->
  <div id="pricing-info" style="
    background:#fffaf0;
    border:1px solid #e6d8b5;
    border-radius:10px;
    padding:14px 16px;
    margin-top:12px;
    font-size:13px;
    color:#555;
    display:none;
  ">
    <p style="margin:0 0 6px; font-weight:600; color:#8B7500;">Subscription Pricing</p>
    <p id="pricing-text" style="margin:0;"></p>
  </div>

  <p style="margin-top:12px;">Already registered? <a href="/login-page">Back to Login</a></p>
</section>

<script>
// Show relevant price when level is selected
const levelPrices = {
  "400": "₦10,263.75",
  "300": "₦8,000.00",
  "200": "₦6,500.00"
};

const levelSelect = document.querySelector('select[name="level"]');
const pricingInfo = document.getElementById("pricing-info");
const pricingText = document.getElementById("pricing-text");

if (levelSelect) {
  levelSelect.addEventListener("change", function () {
    const price = levelPrices[this.value];
    if (price) {
      pricingText.textContent =
        "Your level subscription is " + price + ". You will pay after registration.";
      pricingInfo.style.display = "block";
    } else {
      pricingInfo.style.display = "none";
    }
  });
}
</script>

<script src="/static/js/register.js"></script>
{% endblock %}
