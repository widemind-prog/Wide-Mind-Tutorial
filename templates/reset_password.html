{% extends "base.html" %}
{% block title %}Reset Password | Wide Mind Tutorial{% endblock %}
{% block content %}

<h2>Reset Your Password</h2>
<p style="color:#555;font-size:14px;">Enter your new password below.</p>

<form id="reset-form">
    <div class="password-wrapper" style="position:relative;">
        <input type="password" id="new-password" placeholder="New password (min 6 characters)" required>
        <i class="fa-regular fa-eye toggle-password-icon"></i>
    </div>
    <button type="submit" id="reset-btn">Reset Password</button>
</form>
<p id="reset-msg" style="margin-top:14px;"></p>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

if (!token) {
    document.getElementById("reset-msg").style.color = "red";
    document.getElementById("reset-msg").textContent = "Invalid reset link.";
    document.getElementById("reset-form").style.display = "none";
}

document.getElementById("reset-form").addEventListener("submit", async function(e) {
    e.preventDefault();
    const password = document.getElementById("new-password").value.trim();
    const msg = document.getElementById("reset-msg");
    const btn = document.getElementById("reset-btn");

    btn.disabled = true;
    btn.textContent = "Resetting...";
    msg.textContent = "";

    try {
        const res = await fetch("/api/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, password })
        });
        const data = await res.json();

        if (res.ok) {
            msg.style.color = "green";
            msg.textContent = "Password reset! Redirecting to login...";
            setTimeout(() => window.location.href = "/login-page", 2000);
        } else {
            msg.style.color = "red";
            msg.textContent = data.error || "Something went wrong.";
            btn.disabled = false;
            btn.textContent = "Reset Password";
        }
    } catch (err) {
        msg.style.color = "red";
        msg.textContent = "Something went wrong. Please try again.";
        btn.disabled = false;
        btn.textContent = "Reset Password";
    }
});
</script>
{% endblock %}
