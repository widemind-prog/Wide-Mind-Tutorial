<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ── CONTROLS BAR ── */
    #controls {
      width: 100%;
      padding: 10px 14px;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #controls button {
      padding: 6px 14px;
      border: none;
      cursor: pointer;
      background: #444;
      color: #fff;
      border-radius: 4px;
      font-size: 14px;
    }
    #controls button:hover { background: #666; }
    #controls button:disabled { opacity: 0.35; cursor: not-allowed; }
    #cancelBtn { background: #a00000; }
    #cancelBtn:hover { background: #c00000; }

    #pageInfo { font-size: 14px; white-space: nowrap; min-width: 90px; text-align: center; }

    /* ── LOADING OVERLAY ── */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      gap: 18px;
      transition: opacity 0.4s ease;
    }

    #loadingOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 5px solid #333;
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loadingText {
      font-size: 15px;
      color: #ccc;
      letter-spacing: 0.5px;
    }

    #loadingProgress {
      font-size: 13px;
      color: #d4af37;
      font-weight: bold;
    }

    /* ── PROGRESS BAR ── */
    #progressBar {
      width: 200px;
      height: 4px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #d4af37, #f1e5ac);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* ── PDF CANVAS AREA ── */
    #pdfWrapper {
      display: inline-block;
      margin: 16px auto;
      max-width: 95%;
    }

    canvas#pdfCanvas {
      display: block;
      max-width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    /* ── ERROR STATE ── */
    #errorBox {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px 20px;
      text-align: center;
    }

    #errorBox .error-icon { font-size: 48px; }
    #errorBox p { color: #ccc; font-size: 15px; max-width: 300px; line-height: 1.6; }
    #errorBox button {
      padding: 10px 24px;
      background: #d4af37;
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    /* ── THUMBNAILS ── */
    #thumbnailsWrapper {
      display: flex;
      align-items: center;
      width: 95%;
      background: #1a1a1a;
      padding: 8px;
      gap: 5px;
      overflow: hidden;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    #thumbnails {
      display: flex;
      overflow-x: auto;
      gap: 6px;
      scroll-behavior: smooth;
      padding: 4px 0;
    }

    #thumbnails::-webkit-scrollbar { height: 4px; }
    #thumbnails::-webkit-scrollbar-track { background: #222; }
    #thumbnails::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

    #thumbnails canvas {
      width: 60px;
      cursor: pointer;
      border: 2px solid #444;
      flex-shrink: 0;
      border-radius: 2px;
      transition: border-color 0.15s;
    }

    #thumbnails canvas.active { border-color: #d4af37; }
    #thumbnails canvas:hover { border-color: #888; }

    .thumbArrow {
      background: #333;
      color: #fff;
      border: none;
      cursor: pointer;
      padding: 5px 10px;
      font-size: 18px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .thumbArrow:hover { background: #555; }

    /* ── PAGE TRANSITION ── */
    #pdfCanvas {
      transition: opacity 0.15s ease;
    }
    #pdfCanvas.fading { opacity: 0.3; }
  </style>
</head>

<body>

<!-- LOADING OVERLAY — shown immediately while PDF loads -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingText">Opening your document…</div>
  <div id="progressBar"><div id="progressFill"></div></div>
  <div id="loadingProgress"></div>
</div>

<!-- ERROR BOX — shown if PDF fails to load -->
<div id="errorBox">
  <div class="error-icon">📄</div>
  <p>We couldn't load the document right now. Please check your connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</div>

<!-- CONTROLS -->
<div id="controls">
  <button id="cancelBtn">✖ Close</button>
  <button id="prevBtn" disabled>◀ Prev</button>
  <span id="pageInfo">Loading…</span>
  <button id="nextBtn" disabled>Next ▶</button>
</div>

<!-- PDF CANVAS -->
<div id="pdfWrapper">
  <canvas id="pdfCanvas"></canvas>
</div>

<!-- THUMBNAILS -->
<div id="thumbnailsWrapper">
  <button class="thumbArrow" id="thumbLeft">&#10094;</button>
  <div id="thumbnails"></div>
  <button class="thumbArrow" id="thumbRight">&#10095;</button>
</div>

<!-- PDF.js — load from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
/* ===== CONFIG ===== */
const pdfUrl   = "{{ supabase_url }}";
const courseUrl = "/course/{{ course_id }}";

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* ===== STATE ===== */
let pdfDoc     = null;
let pageNum    = 1;
let totalPages = 0;
let rendering  = false;
const pageCache = {};

/* ===== ELEMENTS ===== */
const canvas       = document.getElementById("pdfCanvas");
const ctx          = canvas.getContext("2d");
const prevBtn      = document.getElementById("prevBtn");
const nextBtn      = document.getElementById("nextBtn");
const pageInfo     = document.getElementById("pageInfo");
const thumbsEl     = document.getElementById("thumbnails");
const thumbLeft    = document.getElementById("thumbLeft");
const thumbRight   = document.getElementById("thumbRight");
const cancelBtn    = document.getElementById("cancelBtn");
const overlay      = document.getElementById("loadingOverlay");
const errorBox     = document.getElementById("errorBox");
const loadingText  = document.getElementById("loadingText");
const loadingProg  = document.getElementById("loadingProgress");
const progressFill = document.getElementById("progressFill");

/* ===== CLOSE BUTTON ===== */
cancelBtn.onclick = () => {
  window.close();
  setTimeout(() => {
    if (window.history.length > 1) window.history.back();
    else window.location.href = courseUrl;
  }, 100);
};

/* ===== HIDE OVERLAY ===== */
function hideOverlay() {
  overlay.classList.add("hidden");
  setTimeout(() => overlay.style.display = "none", 400);
}

function showError() {
  overlay.style.display = "none";
  errorBox.style.display = "flex";
}

/* ===== LOAD PDF WITH PROGRESS ===== */
loadingText.textContent = "Connecting to document…";

const loadingTask = pdfjsLib.getDocument({
  url: pdfUrl,
  rangeChunkSize: 65536,   // 64KB chunks — faster range requests
  disableAutoFetch: false,
  disableStream: false,
});

loadingTask.onProgress = function(data) {
  if (data.total) {
    const pct = Math.round((data.loaded / data.total) * 100);
    progressFill.style.width = pct + "%";
    loadingProg.textContent  = pct + "%";
    if (pct < 30)       loadingText.textContent = "Connecting to document…";
    else if (pct < 70)  loadingText.textContent = "Loading pages…";
    else if (pct < 95)  loadingText.textContent = "Almost ready…";
    else                loadingText.textContent = "Rendering first page…";
  }
};

loadingTask.promise
  .then(pdf => {
    pdfDoc     = pdf;
    totalPages = pdf.numPages;
    progressFill.style.width = "100%";
    loadingText.textContent  = "Rendering first page…";

    // Render page 1 FIRST, then hide overlay, then build thumbnails
    return renderPage(1, true);
  })
  .then(() => {
    hideOverlay();
    createThumbnails();          // build thumbnails in background
    preloadAdjacentPages(1);     // preload page 2 in background
  })
  .catch(err => {
    console.error("PDF load error:", err);
    showError();
  });

/* ===== RENDER PAGE ===== */
function renderPage(num, firstLoad = false) {
  if (!pdfDoc || rendering) return Promise.resolve();
  rendering = true;

  // Fade canvas during page switch (not on first load)
  if (!firstLoad) canvas.classList.add("fading");

  return new Promise((resolve) => {
    // Use cache if available
    if (pageCache[num]) {
      const img = new Image();
      img.onload = () => {
        canvas.width  = img.width;
        canvas.height = img.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        canvas.classList.remove("fading");
        updateUI(num);
        rendering = false;
        resolve();
      };
      img.src = pageCache[num];
      return;
    }

    pdfDoc.getPage(num).then(page => {
      // Responsive scale — fit to screen width
      const maxWidth = Math.min(window.innerWidth * 0.95, 900);
      const unscaled = page.getViewport({ scale: 1 });
      const scale    = maxWidth / unscaled.width;
      const viewport = page.getViewport({ scale });

      canvas.width  = viewport.width;
      canvas.height = viewport.height;

      page.render({ canvasContext: ctx, viewport }).promise.then(() => {
        pageCache[num] = canvas.toDataURL(); // cache rendered page
        canvas.classList.remove("fading");
        updateUI(num);
        rendering = false;
        resolve();
      });
    }).catch(() => { rendering = false; resolve(); });
  });
}

/* ===== PRELOAD ADJACENT PAGES (background) ===== */
function preloadAdjacentPages(current) {
  [current + 1, current - 1].forEach(n => {
    if (n >= 1 && n <= totalPages && !pageCache[n]) {
      pdfDoc.getPage(n).then(page => {
        const viewport   = page.getViewport({ scale: 0.8 });
        const tempCanvas = document.createElement("canvas");
        tempCanvas.width  = viewport.width;
        tempCanvas.height = viewport.height;
        page.render({
          canvasContext: tempCanvas.getContext("2d"),
          viewport
        }).promise.then(() => {
          pageCache[n] = tempCanvas.toDataURL();
        });
      });
    }
  });
}

/* ===== THUMBNAILS (built lazily in background) ===== */
function createThumbnails() {
  for (let i = 1; i <= totalPages; i++) {
    const thumbCanvas = document.createElement("canvas");
    thumbsEl.appendChild(thumbCanvas);

    // Stagger thumbnail rendering so it doesn't block main thread
    setTimeout(() => {
      if (!pdfDoc) return;
      pdfDoc.getPage(i).then(page => {
        const viewport = page.getViewport({ scale: 0.15 });
        thumbCanvas.width  = viewport.width;
        thumbCanvas.height = viewport.height;
        page.render({
          canvasContext: thumbCanvas.getContext("2d"),
          viewport
        }).promise.then(() => {
          thumbCanvas.onclick = () => {
            pageNum = i;
            renderPage(pageNum).then(() => preloadAdjacentPages(pageNum));
          };
          if (i === 1) thumbCanvas.classList.add("active");
        });
      });
    }, i * 80); // stagger each thumbnail by 80ms
  }
}

function highlightThumbnail(num) {
  thumbsEl.querySelectorAll("canvas").forEach((c, i) => {
    c.classList.toggle("active", i + 1 === num);
  });
}

/* ===== UI ===== */
function updateUI(num) {
  pageInfo.textContent = `Page ${num} of ${totalPages}`;
  prevBtn.disabled = num <= 1;
  nextBtn.disabled = num >= totalPages;
  highlightThumbnail(num);
}

/* ===== CONTROLS ===== */
prevBtn.onclick = () => {
  if (pageNum > 1) {
    pageNum--;
    renderPage(pageNum).then(() => preloadAdjacentPages(pageNum));
  }
};

nextBtn.onclick = () => {
  if (pageNum < totalPages) {
    pageNum++;
    renderPage(pageNum).then(() => preloadAdjacentPages(pageNum));
  }
};

thumbLeft.onclick  = () => thumbsEl.scrollBy({ left: -200, behavior: "smooth" });
thumbRight.onclick = () => thumbsEl.scrollBy({ left:  200, behavior: "smooth" });

/* ===== KEYBOARD NAVIGATION ===== */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowDown") nextBtn.click();
  if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   prevBtn.click();
  if ((e.ctrlKey || e.metaKey) && ["s","p"].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});

/* ===== PROTECTION ===== */
canvas.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>
