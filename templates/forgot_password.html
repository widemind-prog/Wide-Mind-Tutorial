{% extends "base.html" %}
{% block title %}Forgot Password | Wide Mind Tutorial{% endblock %}
{% block content %}

<h2>Forgot Password</h2>
<p style="color:#555;font-size:14px;">Enter your email and we'll send you a reset link.</p>

<form id="forgot-form">
    <input type="email" name="email" id="fp-email" placeholder="Your email address" required>
    <button type="submit" id="fp-btn">Send Reset Link</button>
</form>
<p id="fp-msg" style="margin-top:14px;"></p>
<br>
<a href="/login-page" style="font-size:13px;color:#8B7500;">← Back to Login</a>

<script>
document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("forgot-form").addEventListener("submit", async function(e) {
        e.preventDefault();
        const email = document.getElementById("fp-email").value.trim();
        const msg = document.getElementById("fp-msg");
        const btn = document.getElementById("fp-btn");

        btn.disabled = true;
        btn.textContent = "Sending...";
        msg.textContent = "";

        try {
            const res = await fetch("/api/auth/forgot-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            msg.style.color = "green";
            msg.textContent = data.message || "Check your email for the reset link.";
        } catch (err) {
            msg.style.color = "red";
            msg.textContent = "Something went wrong. Please try again.";
        } finally {
            btn.disabled = false;
            btn.textContent = "Send Reset Link";
        }
    });
});
</script>
{% endblock %}
